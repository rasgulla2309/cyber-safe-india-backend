<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Login | Cyber Safe India</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== RESET ===== */
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Segoe UI",Roboto,Arial,sans-serif;
}

/* ===== PAGE BG ===== */
body{
min-height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(135deg,#0d6efd,#091f43);
}

/* ===== NAVBAR ===== */
.navbar{
width:100%;
padding:14px 24px;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 12px rgba(0,0,0,.1);
}

.logo{
font-weight:700;
color:#0d6efd;
font-size:20px;
}

.home-link{
text-decoration:none;
color:#0d6efd;
font-weight:600;
}

/* ===== CENTER WRAP ===== */
.wrapper{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* ===== CARD ===== */
.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.96);
padding:32px;
border-radius:18px;
box-shadow:0 30px 60px rgba(0,0,0,.35);
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* ===== HEADER ===== */
.title{
text-align:center;
font-size:22px;
font-weight:700;
color:#0d6efd;
}

.subtitle{
text-align:center;
color:#6b7280;
font-size:13px;
margin-bottom:24px;
}

/* ===== INPUT ===== */
label{
font-size:13px;
color:#374151;
display:block;
margin-top:12px;
}

input{
width:100%;
padding:13px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:15px;
margin-top:6px;
transition:.2s;
}

input:focus{
outline:none;
border-color:#0d6efd;
box-shadow:0 0 0 3px rgba(13,110,253,.15);
}

/* ===== BUTTON ===== */
button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
margin-top:14px;
font-weight:600;
font-size:15px;
cursor:pointer;
background:#0d6efd;
color:white;
transition:.2s;
}

button:hover{
background:#0b5ed7;
}

/* ===== STATUS ===== */
.status{
text-align:center;
font-size:14px;
margin-top:10px;
}

/* ===== OTP BOX ===== */
#otpBox{
display:none;
animation:slide .3s ease;
}

@keyframes slide{
from{opacity:0;transform:translateX(15px)}
to{opacity:1;transform:translateX(0)}
}

/* ===== FOOTER LINKS ===== */
.bottom-links{
margin-top:18px;
text-align:center;
font-size:12px;
}

.bottom-links a{
color:#0d6efd;
text-decoration:none;
margin:0 6px;
}

.bottom-links a:hover{
text-decoration:underline;
}

/* ===== DISCLAIMER ===== */
.disclaimer{
text-align:center;
font-size:11px;
color:#6b7280;
margin-top:12px;
line-height:1.4;
}

/* ===== MOBILE ===== */
@media(max-width:480px){
.card{
padding:24px;
}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">🛡 Cyber Safe India</div>
<a href="index.html" class="home-link">Home</a>
</div>

<div class="wrapper">

<div class="card">

<div class="title">Secure OTP Login</div>
<div class="subtitle">Authentication required to continue</div>

<!-- PHONE -->
<div id="phoneBox">

<label>Mobile Number</label>
<input id="phone" type="tel" placeholder="Enter mobile number">

<button id="sendOtpBtn">Send OTP</button>

</div>

<!-- OTP -->
<div id="otpBox">

<label>Verification Code</label>
<input id="otp" type="number" placeholder="Enter received OTP">

<button id="verifyOtpBtn">Verify OTP</button>

</div>

<div id="status" class="status"></div>

<div class="bottom-links">
<a href="privacy.html">Privacy</a> |
<a href="terms.html">Terms</a> |
<a href="contact.html">Contact</a>
</div>

<div class="disclaimer">
Independent Cybersecurity Awareness Project<br>
Not affiliated with any government authority
</div>

</div>
</div>

<script src="assets/js/user-login.js"></script>

</body>
</html>
