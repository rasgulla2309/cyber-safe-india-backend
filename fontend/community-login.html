<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Community Login | Cyber Safe India</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* GLOBAL */
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Segoe UI",Roboto,Arial,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0d6efd,#091f43);
display:flex;
flex-direction:column;
}

/* NAVBAR */
.navbar{
background:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 12px rgba(0,0,0,.1);
}

.logo{
font-weight:700;
color:#0d6efd;
font-size:18px;
}

.navbar a{
text-decoration:none;
color:#0d6efd;
font-weight:600;
}

/* CENTER WRAPPER */
.wrapper{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* CARD */
.login-card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.96);
border-radius:16px;
padding:30px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(15px)}
to{opacity:1; transform:translateY(0)}
}

.subtitle{
text-align:center;
font-size:13px;
color:#6b7280;
margin-bottom:22px;
}

/* INPUT */
.input-group{
margin-bottom:16px;
}

label{
font-size:13px;
color:#374151;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #d1d5db;
margin-top:6px;
font-size:14px;
}

input:focus{
outline:none;
border-color:#0d6efd;
box-shadow:0 0 0 3px rgba(13,110,253,.15);
}

/* PASSWORD TOGGLE */
.password-box{
position:relative;
}

.toggle{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:12px;
color:#0d6efd;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:15px;
font-weight:600;
background:#0d6efd;
color:white;
cursor:pointer;
transition:.2s;
}

button:disabled{
background:#7aa7ff;
cursor:not-allowed;
}

button:hover:not(:disabled){
background:#0b5ed7;
}

/* STATUS */
.status{
text-align:center;
margin-top:14px;
font-size:14px;
}

/* FOOTER LINKS */
.links{
text-align:center;
font-size:12px;
margin-top:16px;
}

.links a{
color:#0d6efd;
text-decoration:none;
margin:0 6px;
}

/* MOBILE */
@media(max-width:480px){
.login-card{
padding:22px;
}
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">🛡 Cyber Safe India</div>
<a href="index.html">Home</a>
</div>

<div class="wrapper">

<div class="login-card">

<div class="subtitle">Community / Admin Access</div>

<div class="input-group">
<label>Username</label>
<input id="username">
</div>

<div class="input-group password-box">
<label>Password</label>
<input id="password" type="password">
<span class="toggle" onclick="togglePass()">Show</span>
</div>

<button id="loginBtn" onclick="login()">Login Securely</button>

<div id="status" class="status"></div>

<div class="links">
<a href="privacy.html">Privacy</a> |
<a href="terms.html">Terms</a>
</div>

</div>
</div>

<script>

const API_BASE="http://127.0.0.1:8000";

function togglePass(){
const p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}

async function login(){

const btn=document.getElementById("loginBtn");
const status=document.getElementById("status");

btn.disabled=true;
status.innerHTML="Authenticating...";

try{

const res=await fetch(API_BASE+"/auth/login",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
username:username.value,
password:password.value
})
});

if(!res.ok){
status.innerHTML="<span style='color:red'>Invalid credentials</span>";
btn.disabled=false;
return;
}

const data=await res.json();

localStorage.setItem("token",data.access_token);
localStorage.setItem("role",data.role);

status.innerHTML="<span style='color:green'>Login success ✓</span>";

setTimeout(()=>{
window.location.href="admin.html";
},700);

}catch(e){
status.innerHTML="<span style='color:red'>Server unreachable</span>";
btn.disabled=false;
}

}

</script>

</body>
</html>
