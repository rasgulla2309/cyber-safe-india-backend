<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat With Us | Cyber Safe India</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f2f5f9;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            color: #fff;
            padding: 18px;
            text-align: center;
        }

        .header h2 {
            margin: 0;
            font-size: 24px;
        }

        .header p {
            margin: 6px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        /* ===== NEW CHAT CARD ===== */
        .new-chat {
            background: #fff;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .new-chat h3 {
            margin-top: 0;
            font-size: 18px;
        }

        textarea {
            width: 100%;
            min-height: 110px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            resize: vertical;
        }

        button {
            margin-top: 10px;
            background: #0d6efd;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #0b5ed7;
        }

        /* ===== CHAT LIST ===== */
        .chat-box {
            margin-top: 25px;
        }

        .chat {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.04);
            word-wrap: break-word;
        }

        .reply {
            margin-top: 10px;
            background: #f1f7ff;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        /* ===== SMALL FLOATING CLEAR CHAT BUTTON ===== */
        .clear-btn {
            position: fixed;
            bottom: 18px;
            right: 18px;

            width: 42px;
            height: 42px;
            padding: 0;

            border-radius: 50%;
            background: #dc3545;
            color: #fff;

            font-size: 16px;
            border: none;
            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;

            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
            z-index: 999;

            transition: transform 0.15s ease, background 0.15s ease;
        }

        .clear-btn:hover {
            background: #bb2d3b;
            transform: scale(1.08);
        }

        /* ===== MOBILE ===== */
        @media (max-width: 600px) {
            .header h2 {
                font-size: 20px;
            }

            .container {
                padding: 12px;
            }

            textarea {
                min-height: 90px;
            }

            .clear-btn {
                width: 38px;
                height: 38px;
                font-size: 14px;
                bottom: 14px;
                right: 14px;
            }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <h2>Cyber Safe India</h2>
    <p>Private Cyber Help Desk – Safe & Secure</p>
</div>

<!-- CONTENT -->
<div class="container">

    <!-- NEW CHAT -->
    <div class="new-chat">
        <h3>🛡️ Submit Your Cyber Issue</h3>
        <textarea id="message" placeholder="Describe your cyber issue..."></textarea>
        <button onclick="submitChat()">Submit Query</button>
    </div>

    <!-- CHAT LIST -->
    <div class="chat-box" id="chatBox"></div>

</div>

<!-- FLOATING CLEAR CHAT -->
<button class="clear-btn" onclick="clearChat()">🗑️</button>

<script src="assets/js/x1.js"></script>
</body>
</html>
